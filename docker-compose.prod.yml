services:
  db:
    image: "${POSTGRES_IMAGE:-postgres:13}"
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
    volumes:
      - dbdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nutrition-net

  backend:
    image: "${BACKEND_IMAGE:?BACKEND_IMAGE is required (immutable tag)}"
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required}"
      USDA_API_KEY: "${USDA_API_KEY:?USDA_API_KEY is required}"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:?CORS_ALLOW_ORIGINS is required}"
      DB_AUTO_CREATE: "${DB_AUTO_CREATE:-false}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      ALEMBIC_CONFIG: /app/Backend/alembic.ini
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${PORT:-8000}"
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-2}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-60}"
      GUNICORN_GRACEFUL_TIMEOUT: "${GUNICORN_GRACEFUL_TIMEOUT:-30}"
      GUNICORN_KEEPALIVE: "${GUNICORN_KEEPALIVE:-5}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nutrition-net
    ports:
      - "${PROD_BACKEND_PORT:-8000}:8000"

  frontend:
    image: "${FRONTEND_IMAGE:?FRONTEND_IMAGE is required (immutable tag)}"
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nutrition-net
    ports:
      - "${PROD_FRONTEND_PORT:-80}:80"

volumes:
  dbdata_prod:

networks:
  nutrition-net:
