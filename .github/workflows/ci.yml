name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nutrition
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nutrition"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nutrition
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache backend dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: backend-${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('Backend/requirements.txt') }}
          restore-keys: |
            backend-${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-
      - name: Verify pip cache
        run: ls -al ~/.cache/pip || echo 'No pip cache found'
      - name: Install backend dependencies
        run: |
          source scripts/env/activate-venv.sh
          pip install pytest
      - name: Check migration drift
        run: |
          source scripts/env/activate-venv.sh
          scripts/db/check-migration-drift.sh
          git diff --exit-code Backend/migrations/versions
      - name: Install frontend dependencies for API schema
        working-directory: Frontend
        run: npm ci
      - name: Run Alembic migrations
        run: |
          source scripts/env/activate-venv.sh
          alembic -c Backend/alembic.ini upgrade head
      - name: Update API schema
        run: |
          source scripts/env/activate-venv.sh
          export BACKEND_PORT=8000
          scripts/db/update-api-schema.sh
      - name: Ensure API schema is up to date
        run: |
          git diff --exit-code Backend/openapi.json Frontend/src/api-types.ts
      - name: Backend tests
        run: |
          source scripts/env/activate-venv.sh
          pytest
      - name: Teardown database
        if: always()
        run: |
          source scripts/env/activate-venv.sh
          python - <<'PY'
          import os
          from sqlalchemy import create_engine, text
          engine = create_engine(os.environ['DATABASE_URL'])
          with engine.begin() as conn:
              conn.execute(text('DROP SCHEMA public CASCADE'))
              conn.execute(text('CREATE SCHEMA public'))
          PY

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        id: setup-node
        with:
          node-version: '20'
      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-${{ runner.os }}-npm-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('Frontend/package-lock.json') }}
          restore-keys: |
            frontend-${{ runner.os }}-npm-${{ steps.setup-node.outputs.node-version }}-
      - name: Verify npm cache
        run: ls -al ~/.npm || echo 'No npm cache found'
      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci
      - name: Frontend dependency audit
        working-directory: Frontend
        run: npm audit --package-lock-only
      - name: Frontend lint
        working-directory: Frontend
        run: npm run lint
      - name: Frontend tests
        working-directory: Frontend
        env:
          CI: true
        run: npm test
      - name: Production build
        working-directory: Frontend
        run: npm run build

  production-smoke:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4
      - name: Write CI production env file
        run: |
          cat > .env.production <<'EOF'
          BACKEND_IMAGE=nutrition-backend:ci
          FRONTEND_IMAGE=nutrition-frontend:ci
          POSTGRES_IMAGE=postgres:13
          POSTGRES_USER=nutrition_user
          POSTGRES_PASSWORD=nutrition_pass
          POSTGRES_DB=nutrition
          DATABASE_URL=postgresql://nutrition_user:nutrition_pass@db:5432/nutrition
          USDA_API_KEY=ci-smoke-test-key
          CORS_ALLOW_ORIGINS=http://127.0.0.1:8080,http://localhost:8080
          DB_AUTO_CREATE=false
          PROD_HTTP_PORT=8080
          EOF
      - name: Build immutable application images
        run: |
          docker build -f Backend/Dockerfile --target prod -t nutrition-backend:ci .
          docker build -f Frontend/Dockerfile -t nutrition-frontend:ci .
      - name: Start production database
        run: |
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d db
      - name: Wait for database readiness
        run: |
          for attempt in {1..30}; do
            if docker compose --env-file .env.production -f docker-compose.prod.yml exec -T db pg_isready -U nutrition_user -d nutrition; then
              exit 0
            fi
            sleep 2
          done

          echo "Database did not become ready within 60 seconds." >&2
          exit 1
      - name: Run explicit production migrations
        run: |
          docker compose --env-file .env.production -f docker-compose.prod.yml run --rm --no-deps backend alembic -c Backend/alembic.ini upgrade head
      - name: Start production application stack
        run: |
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d backend frontend edge
      - name: Smoke test production endpoints
        run: |
          wait_for_url() {
            local url="$1"
            local output_file="$2"

            for attempt in {1..60}; do
              if curl --fail --silent --show-error "$url" > "$output_file"; then
                return 0
              fi
              sleep 2
            done

            echo "Timed out waiting for $url" >&2
            return 1
          }

          wait_for_url "http://127.0.0.1:8080/healthz" /tmp/edge-health.json
          cat /tmp/edge-health.json
          grep -q '"status":"ok"' /tmp/edge-health.json

          wait_for_url "http://127.0.0.1:8080/api/health/ready" /tmp/backend-ready.json
          cat /tmp/backend-ready.json
          grep -q '"status":"ready"' /tmp/backend-ready.json
          grep -q '"dependencies":"database"' /tmp/backend-ready.json
      - name: Show production compose status
        if: always()
        run: |
          docker compose --env-file .env.production -f docker-compose.prod.yml ps
      - name: Show production compose logs on failure
        if: failure()
        run: |
          docker compose --env-file .env.production -f docker-compose.prod.yml logs --no-color
      - name: Teardown production stack
        if: always()
        run: |
          docker compose --env-file .env.production -f docker-compose.prod.yml down -v --remove-orphans

